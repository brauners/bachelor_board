services:
  app:
    build:
      context: .
      target: production
    ports:
      - "${APP_PORT:-8787}:8787"
    environment:
      PORT: "8787"
      STATE_FILE: "/data/state.json"
      DEFAULT_STATE_FILE: "/app/shared/default-state.json"
      CLIENT_DIST_DIR: "/app/dist"
      ADMIN_KEY: "${ADMIN_KEY:-marius-live}"
    volumes:
      - app_data:/data

volumes:
  app_data:
